<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My SuperMarket Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">SUPERMARKET</div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">Tablets</a></li>
                <li><a href="#">Accessories</a></li>
            </ul>
            <div class="search-box">
                <input type="text" placeholder="Search product...">
            </div>
        </nav>
    </header>
        <section class="hero-section">
        <div class="hero-content">
            <p class="sub-title">NOW IN TWO SIZES.</p>
            <h1>Everything you love is now even better with iOS 10, our biggest release yet.</h1>
            <a href="#" class="shop-now-btn">SHOP NOW</a>
        </div>
        <div class="hero-dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </section>

    <section class="promo-section">
        <div class="promo-card headphone">
            <div class="promo-text">
                <h3>HEADPHONE & ACCESSORIES</h3>
                <span class="price-tag">$250.00</span>
            </div>
        </div>
        <div class="promo-card deals">
            <div class="promo-text">
                <p>FROM 9AM DAILY</p>
                <h3>LOVE & DEALS UP TO 70% OFF</h3>
            </div>
        </div>
        <div class="promo-card tablet">
            <div class="promo-text">
                <h3>TABLET & ACCESSORIES</h3>
                <span class="price-tag">$250.00</span>
            </div>
        </div>
    </section>

</body>
</html>

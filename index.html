<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My SuperMarket Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">SUPERMARKET</div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">Tablets</a></li>
                <li><a href="#">Accessories</a></li>
            </ul>
            <div class="search-box">
                <input type="text" placeholder="Search product...">
            </div>
        </nav>
    </header>
        <section class="hero-section" style="background-image: url('https://images.unsplash.com/photo-1510557880182-3d4d3cba3f21?q=80&w=1470&auto=format&fit=crop'); background-size: cover; background-position: center;">
        <div class="hero-content">
            <p class="sub-title" style="color: #ff6600; font-weight: bold;">NOW IN TWO SIZES.</p>
            <h1>Everything you love is now even better.</h1>
            <a href="#" class="shop-now-btn">SHOP NOW</a>
        </div>
        <div class="hero-dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </section>

    <section class="promo-section">
        <div class="promo-card headphone" style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=500&auto=format&fit=crop'); background-size: cover;">
            <div class="promo-text">
                <h3>HEADPHONE & ACCESSORIES</h3>
                <span class="price-tag">$250.00</span>
            </div>
        </div>
        
        <div class="promo-card deals" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?q=80&w=500&auto=format&fit=crop'); background-size: cover;">
            <div class="promo-text">
                <p>FROM 9AM DAILY</p>
                <h3>LOVE & DEALS UP TO 70% OFF</h3>
            </div>
        </div>

        <div class="promo-card tablet" style="background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?q=80&w=500&auto=format&fit=crop'); background-size: cover;">
            <div class="promo-text">
                <h3>TABLET & ACCESSORIES</h3>
                <span class="price-tag">$250.00</span>
            </div>
        </div>
    </section>

</body>
</html>
